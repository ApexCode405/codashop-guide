<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ApexCode | Genshin Impact Top-Up Guide</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="ambient-canvas">
        <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" preserveAspectRatio="none" class="bg-svg-layer">
            <defs>
                <linearGradient id="bg-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" class="stop-color-1" />
                    <stop offset="50%" class="stop-color-2" />
                    <stop offset="100%" class="stop-color-3" />
                </linearGradient>
                <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" class="glow-stop-center" />
                    <stop offset="100%" class="glow-stop-edge" />
                </radialGradient>
                <filter id="neon-blur" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
                <pattern id="hex-grid" width="40" height="69.282" patternUnits="userSpaceOnUse" patternTransform="scale(0.5)">
                    <path d="M 40 0 L 20 11.547 L 0 0 L 0 23.094 L 20 34.641 L 40 23.094 Z M 0 34.641 L 20 46.188 L 0 57.735 L 0 80.829 L 20 69.282 L 40 80.829 L 40 57.735 L 20 46.188 Z" class="grid-path" fill="none" stroke-width="1"/>
                </pattern>
                <pattern id="circuit-board" width="100" height="100" patternUnits="userSpaceOnUse">
                    <circle cx="10" cy="10" r="2" class="circuit-node" />
                    <circle cx="50" cy="80" r="2" class="circuit-node" />
                    <circle cx="90" cy="40" r="2" class="circuit-node" />
                    <path d="M10 10 L30 10 L40 20 L40 50 L50 60 L50 80 M40 50 L80 50 L90 40" class="circuit-line" fill="none" stroke-width="0.5" />
                </pattern>
                <filter id="glitch-effect">
                    <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise" />
                    <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G" />
                </filter>
            </defs>
            <rect width="100%" height="100%" fill="url(#bg-grad-1)" />
            <rect width="100%" height="100%" fill="url(#hex-grid)" opacity="0.3" class="animated-grid" />
            <rect width="100%" height="100%" fill="url(#circuit-board)" opacity="0.15" class="animated-circuit" />
            <circle cx="20%" cy="30%" r="300" fill="url(#bg-glow)" filter="url(#neon-blur)" class="floating-orb orb-1" />
            <circle cx="80%" cy="70%" r="400" fill="url(#bg-glow)" filter="url(#neon-blur)" class="floating-orb orb-2" />
            <circle cx="50%" cy="10%" r="200" fill="url(#bg-glow)" filter="url(#neon-blur)" class="floating-orb orb-3" />
            <path d="M-100,50 Q200,150 500,50 T1100,50" class="energy-wave wave-1" fill="none" stroke-width="2" opacity="0.4" />
            <path d="M-100,150 Q300,50 600,150 T1200,150" class="energy-wave wave-2" fill="none" stroke-width="1.5" opacity="0.3" />
            <path d="M-100,250 Q400,350 700,250 T1300,250" class="energy-wave wave-3" fill="none" stroke-width="1" opacity="0.2" />
        </svg>
    </div>

<!-- ================= -->

<div class="dynamic-payment-box pulse-animation">
    <div class="dynamic-inner">
        <span class="dynamic-label">Current payment option to make:</span>
        <span class="dynamic-value">Blessing of the Welkin Moon</span>
    </div>
    <div class="dynamic-border-fx"></div>
</div>
<!-- ================= -->

</body>
</html>
